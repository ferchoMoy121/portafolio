<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Consolas, monospace; }
      .title   { font-size:15px; font-weight:bold; fill:#e2e8f0; }
      .sub     { font-size:10px; fill:#94a3b8; }
      .label   { font-size:11px; font-weight:bold; fill:#e2e8f0; }
      .port    { font-size:9px;  fill:#64748b; }
      .desc    { font-size:9px;  fill:#94a3b8; }
      .sec     { font-size:10px; font-weight:bold; letter-spacing:1px; }
      .make-cmd{ font-size:9px;  fill:#fbbf24; font-family:Consolas,monospace; }
    </style>
    <marker id="arr"  markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#475569"/></marker>
    <marker id="arrB" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3b82f6"/></marker>
    <marker id="arrG" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#22c55e"/></marker>
    <marker id="arrO" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f97316"/></marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="958" height="618" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" class="title">Monitoring Lab — Prometheus Stack + ELK Stack</text>
  <text x="480" y="46" text-anchor="middle" class="sub">Makefile orchestrates two independent monitoring stacks via Docker Compose</text>

  <!-- ══ MAKEFILE ORCHESTRATOR ══════════════════════════════════════════ -->
  <rect x="30" y="58" width="900" height="72" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="76" text-anchor="middle" class="sec" style="fill:#fbbf24">⚙ MAKEFILE ORCHESTRATOR</text>
  <text x="480" y="90" text-anchor="middle" class="desc">Single interface for build · start · stop · restart · delete — with post-operation validation</text>

  <!-- Make targets shown -->
  <rect x="50"  y="96" width="130" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="115" y="113" text-anchor="middle" class="make-cmd">make build_monitor</text>
  <rect x="195" y="96" width="115" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="252" y="113" text-anchor="middle" class="make-cmd">make build_elk</text>
  <rect x="325" y="96" width="100" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="375" y="113" text-anchor="middle" class="make-cmd">make stop_elk</text>
  <rect x="440" y="96" width="110" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="495" y="113" text-anchor="middle" class="make-cmd">make delete_elk</text>
  <rect x="565" y="96" width="110" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="620" y="113" text-anchor="middle" class="make-cmd">make restart_elk</text>
  <rect x="690" y="96" width="120" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="750" y="113" text-anchor="middle" class="make-cmd">make build_redis_test</text>
  <rect x="825" y="96" width="90" height="24" rx="4" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="870" y="113" text-anchor="middle" class="make-cmd">make help</text>

  <!-- Arrows from Makefile down to stacks -->
  <line x1="265" y1="130" x2="265" y2="152" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="695" y1="130" x2="695" y2="152" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- ══ PROMETHEUS STACK ═══════════════════════════════════════════════ -->
  <rect x="30" y="152" width="460" height="340" rx="10" fill="#0a1628" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="174" text-anchor="middle" class="sec" style="fill:#7dd3fc">▸ PROMETHEUS STACK</text>
  <text x="260" y="188" text-anchor="middle" class="desc">Metrics / Time-series monitoring → Grafana dashboards</text>
  <text x="260" y="200" text-anchor="middle" class="desc" style="fill:#f59e0b">make build_monitor → deploys 4 services in order</text>

  <!-- Redis -->
  <rect x="50" y="208" width="180" height="70" rx="7" fill="#1e2d4a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="140" y="227" text-anchor="middle" class="label" style="fill:#fca5a5">① Redis</text>
  <text x="140" y="242" text-anchor="middle" class="port">:6379 (TCP)</text>
  <text x="140" y="256" text-anchor="middle" class="desc">In-memory data store</text>
  <text x="140" y="268" text-anchor="middle" class="desc">Metrics source for exporter</text>

  <!-- Redis Exporter -->
  <rect x="260" y="208" width="200" height="70" rx="7" fill="#1e2d4a" stroke="#f97316" stroke-width="1.2"/>
  <text x="360" y="227" text-anchor="middle" class="label" style="fill:#fdba74">② Redis Exporter</text>
  <text x="360" y="242" text-anchor="middle" class="port">:9121 (HTTP /metrics)</text>
  <text x="360" y="256" text-anchor="middle" class="desc">Translates Redis stats →</text>
  <text x="360" y="268" text-anchor="middle" class="desc">Prometheus format</text>

  <!-- Arrow Redis → Exporter -->
  <line x1="231" y1="243" x2="258" y2="243" stroke="#f97316" stroke-width="1.2" marker-end="url(#arrO)"/>

  <!-- Prometheus -->
  <rect x="50" y="302" width="180" height="70" rx="7" fill="#1e2d4a" stroke="#f97316" stroke-width="1.2"/>
  <text x="140" y="321" text-anchor="middle" class="label" style="fill:#fdba74">③ Prometheus</text>
  <text x="140" y="336" text-anchor="middle" class="port">:9090 (HTTP)</text>
  <text x="140" y="350" text-anchor="middle" class="desc">Scrapes /metrics every 15s</text>
  <text x="140" y="362" text-anchor="middle" class="desc">Stores time-series data</text>

  <!-- Arrow Exporter → Prometheus (scrape) -->
  <line x1="360" y1="278" x2="230" y2="310" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrO)"/>
  <text x="315" y="299" text-anchor="middle" class="port" style="fill:#f97316">scrape</text>

  <!-- Grafana -->
  <rect x="260" y="302" width="200" height="70" rx="7" fill="#1e2d4a" stroke="#f97316" stroke-width="1.2"/>
  <text x="360" y="321" text-anchor="middle" class="label" style="fill:#fdba74">④ Grafana</text>
  <text x="360" y="336" text-anchor="middle" class="port">:3000 (HTTP)</text>
  <text x="360" y="350" text-anchor="middle" class="desc">Visualization dashboards</text>
  <text x="360" y="362" text-anchor="middle" class="desc">Queries Prometheus datasource</text>

  <!-- Arrow Prometheus → Grafana -->
  <line x1="231" y1="337" x2="258" y2="337" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrB)"/>
  <text x="245" y="330" text-anchor="middle" class="port" style="fill:#3b82f6">query</text>

  <!-- Deployment order note -->
  <rect x="50" y="390" width="410" height="42" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="255" y="407" text-anchor="middle" class="desc" style="fill:#64748b">Deployment order via $(MAKE) recursive calls:</text>
  <text x="255" y="422" text-anchor="middle" class="desc" style="fill:#fbbf24">prometheus → redis → redis-exporter → grafana</text>

  <!-- Validation box -->
  <rect x="50" y="445" width="410" height="36" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="255" y="461" text-anchor="middle" class="desc" style="fill:#4ade80">stop_monitor validates: docker ps --filter status=running</text>
  <text x="255" y="474" text-anchor="middle" class="desc" style="fill:#4ade80">delete_monitor validates: grep exit code → ✅ / ❌ per service</text>

  <!-- ══ ELK STACK ══════════════════════════════════════════════════════ -->
  <rect x="510" y="152" width="420" height="340" rx="10" fill="#0a1a12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="174" text-anchor="middle" class="sec" style="fill:#86efac">▸ ELK STACK  v8.12.0</text>
  <text x="720" y="188" text-anchor="middle" class="desc">Log ingestion · indexing · search · visualization</text>
  <text x="720" y="200" text-anchor="middle" class="desc" style="fill:#f59e0b">make build_elk → docker-compose build + up -d</text>

  <!-- Logstash -->
  <rect x="530" y="208" width="185" height="80" rx="7" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="622" y="228" text-anchor="middle" class="label" style="fill:#86efac">Logstash</text>
  <text x="622" y="243" text-anchor="middle" class="port">:5044 (Beats) · :5000 (TCP)</text>
  <text x="622" y="257" text-anchor="middle" class="desc">Ingest · parse · filter</text>
  <text x="622" y="270" text-anchor="middle" class="desc">grok patterns + mutate</text>
  <text x="622" y="281" text-anchor="middle" class="desc">→ outputs to Elasticsearch</text>

  <!-- Elasticsearch -->
  <rect x="725" y="208" width="185" height="80" rx="7" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="817" y="228" text-anchor="middle" class="label" style="fill:#86efac">Elasticsearch</text>
  <text x="817" y="243" text-anchor="middle" class="port">:9200 (REST) · :9300 (transport)</text>
  <text x="817" y="257" text-anchor="middle" class="desc">Distributed search engine</text>
  <text x="817" y="270" text-anchor="middle" class="desc">Index shards + replicas</text>
  <text x="817" y="281" text-anchor="middle" class="desc">Full-text + structured queries</text>

  <!-- Arrow Logstash → Elasticsearch -->
  <line x1="716" y1="248" x2="723" y2="248" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="719" y="242" text-anchor="middle" class="port" style="fill:#22c55e">bulk</text>

  <!-- Kibana -->
  <rect x="627" y="313" width="185" height="80" rx="7" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="720" y="333" text-anchor="middle" class="label" style="fill:#86efac">Kibana</text>
  <text x="720" y="348" text-anchor="middle" class="port">:5601 (HTTP)</text>
  <text x="720" y="362" text-anchor="middle" class="desc">Dashboards · Discover</text>
  <text x="720" y="375" text-anchor="middle" class="desc">Dev Tools · Index Management</text>
  <text x="720" y="386" text-anchor="middle" class="desc">Queries Elasticsearch REST</text>

  <!-- Arrow Elasticsearch → Kibana -->
  <line x1="817" y1="288" x2="790" y2="311" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrG)"/>

  <!-- Version pin note -->
  <rect x="530" y="408" width="380" height="30" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="720" y="428" text-anchor="middle" class="desc" style="fill:#fbbf24">ELASTICSEARCH_VERSION = KIBANA_VERSION = LOGSTASH_VERSION = 8.12.0</text>

  <!-- Delete validation box -->
  <rect x="530" y="448" width="380" height="36" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="720" y="464" text-anchor="middle" class="desc" style="fill:#4ade80">delete_elk: stop → down → rmi (3 images)</text>
  <text x="720" y="477" text-anchor="middle" class="desc" style="fill:#4ade80">validates each image/container individually → ✅ / ❌</text>

  <!-- ══ DOCKER ENGINE ══════════════════════════════════════════════════ -->
  <rect x="30" y="507" width="900" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="480" y="527" text-anchor="middle" class="sec" style="fill:#8b949e">🐳  DOCKER ENGINE</text>
  <text x="480" y="543" text-anchor="middle" class="desc">Each service isolated in its own directory with independent docker-compose.yml  ·  Bridge network per stack</text>

  <!-- Legend -->
  <line x1="30" y1="574" x2="60" y2="574" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="66" y="578" class="desc">Make target</text>
  <line x1="140" y1="574" x2="170" y2="574" stroke="#f97316" stroke-width="1.5"/>
  <text x="176" y="578" class="desc">Prometheus flow</text>
  <line x1="280" y1="574" x2="310" y2="574" stroke="#22c55e" stroke-width="1.5"/>
  <text x="316" y="578" class="desc">ELK flow</text>
  <line x1="370" y1="574" x2="400" y2="574" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="406" y="578" class="desc">Query/datasource</text>
  <line x1="510" y1="574" x2="540" y2="574" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="546" y="578" class="desc">Validation check</text>
  <text x="930" y="578" text-anchor="end" class="desc" style="fill:#374151">Fernando Priego — Monitoring Lab</text>
</svg>
