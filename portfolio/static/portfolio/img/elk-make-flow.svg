<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Consolas, monospace; }
      .title  { font-size:14px; font-weight:bold; fill:#e2e8f0; }
      .sub    { font-size:9px;  fill:#94a3b8; }
      .label  { font-size:11px; font-weight:bold; }
      .mono   { font-size:9px;  font-family:Consolas,monospace; fill:#fbbf24; }
      .desc   { font-size:9px;  fill:#94a3b8; }
      .ok     { font-size:9px;  fill:#4ade80; }
      .err    { font-size:9px;  fill:#f87171; }
      .step   { font-size:10px; font-weight:bold; fill:#e2e8f0; }
    </style>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f59e0b"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3b82f6"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#22c55e"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f87171"/></marker>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="900" height="540" fill="url(#bg2)" rx="12"/>
  <rect x="1" y="1" width="898" height="538" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <text x="450" y="28" text-anchor="middle" class="title">Make Orchestration Flow — build_elk lifecycle</text>
  <text x="450" y="42" text-anchor="middle" class="sub">How a single Make target coordinates Docker Compose, validation, and teardown</text>

  <!-- ─── COLUMN HEADERS ──────────────────────────────────────────────── -->
  <text x="90"  y="65" text-anchor="middle" class="step" style="fill:#f59e0b">Developer</text>
  <text x="290" y="65" text-anchor="middle" class="step" style="fill:#7dd3fc">Makefile</text>
  <text x="510" y="65" text-anchor="middle" class="step" style="fill:#a78bfa">Docker Compose</text>
  <text x="730" y="65" text-anchor="middle" class="step" style="fill:#86efac">Containers</text>

  <!-- Column dividers -->
  <line x1="190" y1="55" x2="190" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="55" x2="400" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="55" x2="620" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── ROW 1: make build_elk ─────────────────────────────────────── -->
  <!-- Dev -->
  <rect x="25" y="78" width="130" height="36" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="90" y="93" text-anchor="middle" class="mono">$ make build_elk</text>
  <text x="90" y="106" text-anchor="middle" class="desc">runs from project root</text>

  <line x1="156" y1="96" x2="208" y2="96" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Makefile step 1 -->
  <rect x="210" y="78" width="178" height="36" rx="6" fill="#1c1917" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="299" y="93" text-anchor="middle" class="mono">cd docker_logs_elk/</text>
  <text x="299" y="106" text-anchor="middle" class="desc">changes dir to ELK folder</text>

  <line x1="389" y1="96" x2="408" y2="96" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Docker Compose build -->
  <rect x="410" y="78" width="198" height="36" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <text x="509" y="93" text-anchor="middle" class="mono">docker-compose build</text>
  <text x="509" y="106" text-anchor="middle" class="desc">pulls images, builds custom layers</text>

  <!-- ─── ROW 2: docker-compose up ─────────────────────────────────── -->
  <line x1="509" y1="114" x2="509" y2="130" stroke="#6366f1" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="410" y="130" width="198" height="36" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <text x="509" y="146" text-anchor="middle" class="mono">docker-compose up -d</text>
  <text x="509" y="159" text-anchor="middle" class="desc">starts containers detached</text>

  <line x1="609" y1="148" x2="628" y2="148" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Containers -->
  <rect x="630" y="78" width="240" height="100" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="750" y="97"  text-anchor="middle" class="label" style="fill:#86efac">Containers started</text>
  <text x="750" y="112" text-anchor="middle" class="ok">✓ elasticsearch:8.12.0  :9200/:9300</text>
  <text x="750" y="126" text-anchor="middle" class="ok">✓ logstash:8.12.0       :5044/:5000</text>
  <text x="750" y="140" text-anchor="middle" class="ok">✓ kibana:8.12.0         :5601</text>
  <text x="750" y="155" text-anchor="middle" class="desc">docker ps --filter status=running</text>
  <text x="750" y="167" text-anchor="middle" class="desc">→ printed to stdout</text>

  <!-- ─── ROW 3: make stop_elk ──────────────────────────────────────── -->
  <line x1="90" y1="200" x2="90" y2="218" stroke="#64748b" stroke-width="1"/>
  <rect x="25" y="218" width="130" height="36" rx="6" fill="#292524" stroke="#64748b" stroke-width="1.2"/>
  <text x="90" y="233" text-anchor="middle" class="mono">$ make stop_elk</text>
  <text x="90" y="246" text-anchor="middle" class="desc">graceful pause</text>

  <line x1="156" y1="236" x2="208" y2="236" stroke="#64748b" stroke-width="1.2" marker-end="url(#a1)"/>

  <rect x="210" y="218" width="178" height="36" rx="6" fill="#1c1917" stroke="#64748b" stroke-width="1.2"/>
  <text x="299" y="233" text-anchor="middle" class="mono">docker-compose stop</text>
  <text x="299" y="246" text-anchor="middle" class="desc">SIGTERM → containers paused</text>

  <line x1="389" y1="236" x2="408" y2="236" stroke="#64748b" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="410" y="218" width="198" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="509" y="233" text-anchor="middle" class="mono">docker-compose stop</text>
  <text x="509" y="246" text-anchor="middle" class="desc">state preserved, data intact</text>

  <rect x="630" y="218" width="240" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="750" y="233" text-anchor="middle" class="label" style="fill:#94a3b8">Containers: Exited</text>
  <text x="750" y="246" text-anchor="middle" class="desc">docker ps --filter status=running → empty</text>

  <!-- ─── ROW 4: make restart_elk ───────────────────────────────────── -->
  <line x1="90" y1="270" x2="90" y2="288" stroke="#3b82f6" stroke-width="1"/>
  <rect x="25" y="288" width="130" height="36" rx="6" fill="#292524" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="90" y="303" text-anchor="middle" class="mono">$ make restart_elk</text>
  <text x="90" y="316" text-anchor="middle" class="desc">stop then start</text>

  <line x1="156" y1="306" x2="208" y2="306" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="210" y="288" width="178" height="36" rx="6" fill="#1c1917" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="299" y="303" text-anchor="middle" class="mono">stop → start</text>
  <text x="299" y="316" text-anchor="middle" class="desc">sequential Make targets</text>

  <line x1="389" y1="306" x2="408" y2="306" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="410" y="288" width="198" height="36" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <text x="509" y="303" text-anchor="middle" class="mono">stop → start</text>
  <text x="509" y="316" text-anchor="middle" class="desc">2 separate compose calls</text>

  <rect x="630" y="288" width="240" height="36" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="750" y="303" text-anchor="middle" class="label" style="fill:#86efac">Containers: Running again</text>
  <text x="750" y="316" text-anchor="middle" class="desc">state printed via docker ps</text>

  <!-- ─── ROW 5: make delete_elk (THE INTERESTING ONE) ─────────────── -->
  <line x1="90" y1="340" x2="90" y2="358" stroke="#f87171" stroke-width="1"/>
  <rect x="25" y="358" width="130" height="36" rx="6" fill="#292524" stroke="#ef4444" stroke-width="1.5"/>
  <text x="90" y="373" text-anchor="middle" class="mono" style="fill:#f87171">$ make delete_elk</text>
  <text x="90" y="386" text-anchor="middle" class="desc">deep clean</text>

  <line x1="156" y1="376" x2="208" y2="376" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a4)"/>

  <rect x="210" y="358" width="178" height="36" rx="6" fill="#2d1b1b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="299" y="370" text-anchor="middle" class="mono" style="fill:#f87171">stop → down → rmi</text>
  <text x="299" y="381" text-anchor="middle" class="desc">3 docker ops in sequence</text>
  <text x="299" y="391" text-anchor="middle" class="desc">prints state before each step</text>

  <line x1="389" y1="376" x2="408" y2="376" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Validation block -->
  <rect x="410" y="340" width="450" height="110" rx="6" fill="#2d1b1b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="635" y="358" text-anchor="middle" class="label" style="fill:#f87171">Validation Pattern (the clever part)</text>
  <text x="635" y="374" text-anchor="middle" class="mono" style="fill:#94a3b8">docker ps -a --filter name=elasticsearch | grep -q elasticsearch</text>
  <text x="635" y="390" text-anchor="middle" class="desc">grep exit 0 (found)   → echo "❌ Elasticsearch aún existe"</text>
  <text x="635" y="404" text-anchor="middle" class="desc">grep exit 1 (not found) → echo "✅ Elasticsearch eliminado"</text>
  <text x="635" y="420" text-anchor="middle" class="desc">Same pattern repeated for: kibana · logstash · 3 Docker images</text>
  <text x="635" y="436" text-anchor="middle" class="desc" style="fill:#fbbf24">Shell &&/|| short-circuit = no if/else needed — idiomatic Makefile</text>

  <!-- ─── ROW 6: make help ──────────────────────────────────────────── -->
  <line x1="90" y1="468" x2="90" y2="482" stroke="#a78bfa" stroke-width="1"/>
  <rect x="25" y="482" width="130" height="36" rx="6" fill="#292524" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="90" y="497" text-anchor="middle" class="mono" style="fill:#c4b5fd">$ make help</text>
  <text x="90" y="510" text-anchor="middle" class="desc">self-documenting</text>

  <line x1="156" y1="500" x2="208" y2="500" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#a1)"/>

  <rect x="210" y="482" width="178" height="36" rx="6" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="299" y="497" text-anchor="middle" class="mono" style="fill:#c4b5fd">fgrep "##" Makefile</text>
  <text x="299" y="510" text-anchor="middle" class="desc">parses ## comments as docs</text>

  <rect x="410" y="482" width="460" height="36" rx="6" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="640" y="497" text-anchor="middle" class="desc" style="fill:#c4b5fd">Prints all targets + descriptions · No separate README needed</text>
  <text x="640" y="510" text-anchor="middle" class="desc" style="fill:#64748b">sed -e 's/##//' strips the ## → clean output</text>
</svg>
