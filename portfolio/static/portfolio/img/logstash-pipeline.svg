<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Consolas, monospace; }
      .title { font-size: 15px; font-weight: bold; fill: #e2e8f0; }
      .subtitle { font-size: 10px; fill: #94a3b8; }
      .label { font-size: 11px; fill: #e2e8f0; font-weight: bold; }
      .desc { font-size: 9px; fill: #94a3b8; }
      .arrow-label { font-size: 9px; fill: #64748b; }
      .section-title { font-size: 10px; fill: #7dd3fc; font-weight: bold; letter-spacing: 1px; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e3a4a"/>
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#0f3f2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="898" height="618" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">SD-WAN + AWS TGW — Logstash Observability Pipeline</text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">4 data sources → normalize → enrich → OpenSearch</text>

  <!-- ─── SECTION: INPUTS ─────────────────────────────── -->
  <text x="44" y="75" class="section-title">▸ INPUTS</text>

  <!-- Input 1: Cisco Syslog -->
  <rect x="20" y="83" width="170" height="88" rx="8" fill="url(#inputGrad)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="105" y="102" text-anchor="middle" class="label">Cisco Syslog</text>
  <text x="105" y="117" text-anchor="middle" class="desc">UDP :514</text>
  <text x="105" y="131" text-anchor="middle" class="desc">CSR 1000v → Logstash</text>
  <text x="105" y="148" text-anchor="middle" class="desc">BGP state, interface,</text>
  <text x="105" y="161" text-anchor="middle" class="desc">tunnel events</text>

  <!-- Input 2: NetFlow -->
  <rect x="20" y="185" width="170" height="88" rx="8" fill="url(#inputGrad)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="105" y="204" text-anchor="middle" class="label">NetFlow v9</text>
  <text x="105" y="219" text-anchor="middle" class="desc">UDP :2055</text>
  <text x="105" y="233" text-anchor="middle" class="desc">CSR → Logstash</text>
  <text x="105" y="250" text-anchor="middle" class="desc">Flow stats: bytes,</text>
  <text x="105" y="263" text-anchor="middle" class="desc">packets, src/dst, port</text>

  <!-- Input 3: S3 VPC Flow Logs -->
  <rect x="20" y="287" width="170" height="88" rx="8" fill="url(#inputGrad)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="105" y="306" text-anchor="middle" class="label">S3 — VPC Flow Logs</text>
  <text x="105" y="321" text-anchor="middle" class="desc">poll interval: 60s</text>
  <text x="105" y="335" text-anchor="middle" class="desc">eth1 decapsulated</text>
  <text x="105" y="352" text-anchor="middle" class="desc">real app traffic</text>
  <text x="105" y="365" text-anchor="middle" class="desc">(post-GRE)</text>

  <!-- Input 4: CloudWatch -->
  <rect x="20" y="389" width="170" height="88" rx="8" fill="url(#inputGrad)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="105" y="408" text-anchor="middle" class="label">CloudWatch Logs</text>
  <text x="105" y="423" text-anchor="middle" class="desc">/aws/transitgateway/connect</text>
  <text x="105" y="437" text-anchor="middle" class="desc">TGW attach state</text>
  <text x="105" y="454" text-anchor="middle" class="desc">BGP events from</text>
  <text x="105" y="467" text-anchor="middle" class="desc">AWS side</text>

  <!-- Arrows Input → Filter -->
  <line x1="191" y1="127" x2="295" y2="310" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)"/>
  <line x1="191" y1="229" x2="295" y2="320" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)"/>
  <line x1="191" y1="331" x2="295" y2="330" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowhead-blue)"/>
  <line x1="191" y1="433" x2="295" y2="350" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)"/>

  <!-- ─── SECTION: FILTER ─────────────────────────────── -->
  <text x="310" y="75" class="section-title">▸ FILTER / TRANSFORM</text>

  <rect x="296" y="83" width="230" height="420" rx="8" fill="url(#filterGrad)" stroke="#a855f7" stroke-width="1.5"/>

  <!-- Filter steps inside -->
  <!-- Step 1 -->
  <rect x="310" y="100" width="202" height="60" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="411" y="119" text-anchor="middle" class="label" style="fill:#a5b4fc">① grok</text>
  <text x="411" y="133" text-anchor="middle" class="desc">Parse raw text into fields</text>
  <text x="411" y="146" text-anchor="middle" class="desc">%{SYSLOGTIMESTAMP} %{IP:src} ...</text>

  <!-- Step 2 -->
  <rect x="310" y="172" width="202" height="60" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="411" y="191" text-anchor="middle" class="label" style="fill:#a5b4fc">② date</text>
  <text x="411" y="205" text-anchor="middle" class="desc">Normalize timestamps → UTC</text>
  <text x="411" y="218" text-anchor="middle" class="desc">@timestamp field creation</text>

  <!-- Step 3 -->
  <rect x="310" y="244" width="202" height="60" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="411" y="263" text-anchor="middle" class="label" style="fill:#a5b4fc">③ mutate / enrich</text>
  <text x="411" y="277" text-anchor="middle" class="desc">Add fields: environment,</text>
  <text x="411" y="290" text-anchor="middle" class="desc">vpc_id, tunnel_id, region</text>

  <!-- Step 4 -->
  <rect x="310" y="316" width="202" height="60" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="411" y="335" text-anchor="middle" class="label" style="fill:#a5b4fc">④ ruby (NetFlow)</text>
  <text x="411" y="349" text-anchor="middle" class="desc">Decode NetFlow v9 binary</text>
  <text x="411" y="362" text-anchor="middle" class="desc">→ structured JSON fields</text>

  <!-- Step 5 -->
  <rect x="310" y="388" width="202" height="60" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="411" y="407" text-anchor="middle" class="label" style="fill:#a5b4fc">⑤ if/else routing</text>
  <text x="411" y="421" text-anchor="middle" class="desc">Route by [type]: syslog /</text>
  <text x="411" y="434" text-anchor="middle" class="desc">netflow / vpc_flow / tgw</text>

  <!-- Step 6 -->
  <rect x="310" y="460" width="202" height="32" rx="5" fill="#1e1b4b" stroke="#4338ca" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="411" y="480" text-anchor="middle" class="desc" style="fill:#818cf8">⑥ drop bad/incomplete events</text>

  <!-- Arrow Filter → Output -->
  <line x1="527" y1="293" x2="620" y2="293" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ─── SECTION: OUTPUT ─────────────────────────────── -->
  <text x="636" y="75" class="section-title">▸ OUTPUTS — OpenSearch</text>

  <!-- Output 1: network-logs -->
  <rect x="621" y="83" width="258" height="90" rx="8" fill="url(#outputGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="106" text-anchor="middle" class="label" style="fill:#86efac">Index: network-logs-YYYY.MM.dd</text>
  <text x="750" y="122" text-anchor="middle" class="desc">All normalized events</text>
  <text x="750" y="137" text-anchor="middle" class="desc">Syslog + NetFlow + VPC Flow + TGW</text>
  <text x="750" y="152" text-anchor="middle" class="desc">Daily rotation, 30-day retention</text>
  <text x="750" y="165" text-anchor="middle" class="desc">→ Main search &amp; correlations</text>

  <!-- Output 2: bgp-events -->
  <rect x="621" y="187" width="258" height="90" rx="8" fill="url(#outputGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="210" text-anchor="middle" class="label" style="fill:#86efac">Index: bgp-events</text>
  <text x="750" y="226" text-anchor="middle" class="desc">Filtered: only BGP state changes</text>
  <text x="750" y="241" text-anchor="middle" class="desc">%BGP-5-ADJCHANGE events</text>
  <text x="750" y="256" text-anchor="middle" class="desc">TGW BGP events</text>
  <text x="750" y="271" text-anchor="middle" class="desc">→ BGP uptime dashboard + alerts</text>

  <!-- Output 3: vpc-flow-realtime -->
  <rect x="621" y="291" width="258" height="90" rx="8" fill="url(#outputGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="314" text-anchor="middle" class="label" style="fill:#86efac">Index: vpc-flow-realtime</text>
  <text x="750" y="330" text-anchor="middle" class="desc">VPC Flow Logs (eth1 decapsulated)</text>
  <text x="750" y="345" text-anchor="middle" class="desc">src/dst IP, port, protocol, bytes</text>
  <text x="750" y="360" text-anchor="middle" class="desc">ACCEPT / REJECT actions</text>
  <text x="750" y="375" text-anchor="middle" class="desc">→ Traffic analysis, top talkers</text>

  <!-- Output 4: netflow-bandwidth -->
  <rect x="621" y="395" width="258" height="90" rx="8" fill="url(#outputGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="418" text-anchor="middle" class="label" style="fill:#86efac">Index: netflow-bandwidth</text>
  <text x="750" y="434" text-anchor="middle" class="desc">NetFlow v9 decoded flows</text>
  <text x="750" y="449" text-anchor="middle" class="desc">Per-interface bandwidth stats</text>
  <text x="750" y="464" text-anchor="middle" class="desc">GRE tunnel utilization</text>
  <text x="750" y="479" text-anchor="middle" class="desc">→ Capacity planning dashboard</text>

  <!-- Output arrows from filter -->
  <line x1="527" y1="240" x2="615" y2="128" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead-green)"/>
  <line x1="527" y1="270" x2="615" y2="232" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead-green)"/>
  <line x1="527" y1="310" x2="615" y2="336" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead-green)"/>
  <line x1="527" y1="360" x2="615" y2="440" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead-green)"/>

  <!-- ─── KINESIS FIREHOSE callout ─────────────────────── -->
  <rect x="621" y="497" width="258" height="65" rx="8" fill="#1c1917" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="516" text-anchor="middle" class="label" style="fill:#fbbf24">⚡ Kinesis Firehose (parallel)</text>
  <text x="750" y="531" text-anchor="middle" class="desc">VPC Flow Logs → Firehose → OpenSearch</text>
  <text x="750" y="546" text-anchor="middle" class="desc">Real-time: &lt;60s latency</text>
  <text x="750" y="557" text-anchor="middle" class="desc">(vs S3 input: ~10min batch)</text>

  <!-- Kinesis note connecting to vpc-flow box -->
  <line x1="750" y1="497" x2="750" y2="486" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>

  <!-- Bottom IAM note -->
  <rect x="20" y="497" width="260" height="40" rx="6" fill="#1c1917" stroke="#6b7280" stroke-width="1"/>
  <text x="150" y="514" text-anchor="middle" class="desc" style="fill:#9ca3af">All outputs use AWS IAM auth</text>
  <text x="150" y="528" text-anchor="middle" class="desc" style="fill:#9ca3af">OpenSearch private VPC (no public endpoint)</text>

  <!-- Logstash center box label -->
  <text x="296" y="515" text-anchor="start" class="section-title" style="fill:#a855f7">LOGSTASH</text>
  <text x="296" y="530" text-anchor="start" class="desc" style="fill:#7c3aed">normalize · enrich · route</text>

  <!-- Legend bottom -->
  <line x1="20" y1="570" x2="50" y2="570" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="56" y="574" class="desc">Input flow</text>
  <line x1="120" y1="570" x2="150" y2="570" stroke="#a855f7" stroke-width="1.5"/>
  <text x="156" y="574" class="desc">Filter processing</text>
  <line x1="250" y1="570" x2="280" y2="570" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="286" y="574" class="desc">Output to index</text>
  <line x1="380" y1="570" x2="410" y2="570" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="416" y="574" class="desc">Firehose real-time path</text>
  <text x="620" y="574" class="desc" style="fill:#475569">SD-WAN + TGW Observability Lab | Fernando Priego</text>
</svg>
