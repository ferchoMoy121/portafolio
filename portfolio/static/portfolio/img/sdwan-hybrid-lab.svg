<svg width="100%" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0d1117" rx="0"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ON-PREMISES ZONE                                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="10" y="15" width="140" height="350" rx="12" fill="#1a1f2e" stroke="#444" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="80" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">On-Premise</text>

  <!-- Branch 1 -->
  <rect x="22" y="50" width="116" height="60" rx="8" fill="#2d1b1b" stroke="#D85A30" stroke-width="1"/>
  <text x="80" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#F0997B">Branch 1</text>
  <text x="80" y="90" text-anchor="middle" font-size="10" fill="#888">Cisco ISR 4451</text>
  <text x="80" y="104" text-anchor="middle" font-size="9" fill="#666">192.168.1.0/24</text>

  <!-- Branch 2 -->
  <rect x="22" y="170" width="116" height="60" rx="8" fill="#2d1b1b" stroke="#D85A30" stroke-width="1"/>
  <text x="80" y="193" text-anchor="middle" font-size="12" font-weight="700" fill="#F0997B">Branch 2</text>
  <text x="80" y="210" text-anchor="middle" font-size="10" fill="#888">Cisco ISR 4451</text>
  <text x="80" y="224" text-anchor="middle" font-size="9" fill="#666">192.168.2.0/24</text>

  <!-- Corp DC -->
  <rect x="22" y="290" width="116" height="60" rx="8" fill="#1e1e2d" stroke="#534AB7" stroke-width="1"/>
  <text x="80" y="313" text-anchor="middle" font-size="12" font-weight="700" fill="#AFA9EC">Corp DC</text>
  <text x="80" y="330" text-anchor="middle" font-size="10" fill="#888">vManage Controller</text>
  <text x="80" y="344" text-anchor="middle" font-size="9" fill="#666">SD-WAN policies</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- AWS CLOUD ZONE                                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="162" y="10" width="725" height="560" rx="16" fill="#0f1c2e" stroke="#185FA5" stroke-width="1.5"/>
  <text x="524" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#378ADD">AWS Cloud — us-east-1</text>

  <!-- CONNECT VPC (dashed container) -->
  <rect x="178" y="48" width="235" height="240" rx="10" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="190" y="65" font-size="10" font-weight="600" fill="#1D9E75">Connect VPC  10.100.0.0/16</text>

  <!-- Availability Zone label -->
  <rect x="188" y="72" width="210" height="200" rx="6" fill="#0a2218" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="198" y="87" font-size="9" fill="#5DCAA5">Availability Zone A (+ Zone B for HA)</text>

  <!-- Public Subnet label -->
  <text x="198" y="108" font-size="9" fill="#5DCAA5">Public subnet — 10.100.1.0/24</text>

  <!-- Cisco CSR 1000v -->
  <rect x="198" y="115" width="190" height="68" rx="8" fill="#0d2a1f" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="293" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#5DCAA5">Cisco CSR 1000v</text>
  <text x="293" y="154" text-anchor="middle" font-size="10" fill="#aaa">SD-WAN virtual appliance</text>
  <text x="293" y="170" text-anchor="middle" font-size="9" fill="#777">ENI: 10.100.1.10  |  EIP: x.x.x.x</text>

  <!-- VGW / Internet GW -->
  <rect x="198" y="200" width="88" height="52" rx="6" fill="#0d2a1f" stroke="#0F6E56" stroke-width="1"/>
  <text x="242" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#5DCAA5">Internet GW</text>
  <text x="242" y="238" text-anchor="middle" font-size="9" fill="#666">igw-xxxxx</text>

  <!-- VGW -->
  <rect x="298" y="200" width="88" height="52" rx="6" fill="#0d2a1f" stroke="#0F6E56" stroke-width="1"/>
  <text x="342" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#5DCAA5">Virtual Private GW</text>
  <text x="342" y="238" text-anchor="middle" font-size="9" fill="#666">Direct Connect</text>

  <!-- ═══ TRANSIT GATEWAY ═══ -->
  <rect x="440" y="90" width="160" height="100" rx="10" fill="#1a0d33" stroke="#7F77DD" stroke-width="2"/>
  <text x="520" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#AFA9EC">Transit</text>
  <text x="520" y="136" text-anchor="middle" font-size="13" font-weight="700" fill="#AFA9EC">Gateway</text>
  <text x="520" y="154" text-anchor="middle" font-size="9" fill="#888">tgw-xxxxxxxx</text>
  <text x="520" y="168" text-anchor="middle" font-size="9" fill="#7F77DD">Connect attachment</text>
  <text x="520" y="180" text-anchor="middle" font-size="9" fill="#7F77DD">Max 5 Gbps/GRE tunnel</text>

  <!-- TGW Route Table labels -->
  <rect x="440" y="205" width="160" height="70" rx="6" fill="#120820" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="520" y="221" text-anchor="middle" font-size="9" font-weight="600" fill="#AFA9EC">Route Tables (segmentación)</text>
  <text x="450" y="237" font-size="8" fill="#888">prod-rt → Prod VPC</text>
  <text x="450" y="250" font-size="8" fill="#888">dev-rt  → Dev VPC</text>
  <text x="450" y="263" font-size="8" fill="#888">voice-rt → Voice VPC</text>

  <!-- ═══ SPOKE VPCs ═══ -->
  <!-- Prod VPC -->
  <rect x="640" y="55" width="130" height="65" rx="8" fill="#0a1929" stroke="#185FA5" stroke-width="1.5"/>
  <text x="705" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#85B7EB">Prod VPC</text>
  <text x="705" y="95" text-anchor="middle" font-size="10" fill="#aaa">10.0.0.0/16</text>
  <text x="705" y="110" text-anchor="middle" font-size="9" fill="#666">EC2 · RDS · EKS</text>

  <!-- Dev VPC -->
  <rect x="640" y="145" width="130" height="65" rx="8" fill="#0a1929" stroke="#185FA5" stroke-width="1.5"/>
  <text x="705" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#85B7EB">Dev VPC</text>
  <text x="705" y="185" text-anchor="middle" font-size="10" fill="#aaa">10.1.0.0/16</text>
  <text x="705" y="200" text-anchor="middle" font-size="9" fill="#666">EC2 · CodeBuild</text>

  <!-- Voice VPC -->
  <rect x="640" y="235" width="130" height="65" rx="8" fill="#1f1800" stroke="#BA7517" stroke-width="1.5"/>
  <text x="705" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#FAC775">Voice VPC</text>
  <text x="705" y="275" text-anchor="middle" font-size="10" fill="#aaa">10.2.0.0/16</text>
  <text x="705" y="290" text-anchor="middle" font-size="9" fill="#666">DSCP · QoS · EF46</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- OBSERVABILITY ZONE                                  -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="178" y="330" width="705" height="225" rx="10" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="190" y="347" font-size="10" font-weight="600" fill="#378ADD">Monitoring VPC — private subnets (no Internet GW)</text>

  <!-- VPC Flow Logs -->
  <rect x="188" y="358" width="160" height="60" rx="8" fill="#0a1929" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="268" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#5DCAA5">VPC Flow Logs</text>
  <text x="268" y="397" text-anchor="middle" font-size="9" fill="#aaa">All VPCs → S3 / CW Logs</text>
  <text x="268" y="410" text-anchor="middle" font-size="8" fill="#666">Decapsulated post-GRE</text>

  <!-- Kinesis Firehose -->
  <rect x="368" y="358" width="155" height="60" rx="8" fill="#1a0d33" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="445" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#AFA9EC">Kinesis Firehose</text>
  <text x="445" y="397" text-anchor="middle" font-size="9" fill="#aaa">Flow Logs + Syslog stream</text>
  <text x="445" y="410" text-anchor="middle" font-size="8" fill="#666">Real-time delivery</text>

  <!-- Logstash -->
  <rect x="543" y="358" width="150" height="60" rx="8" fill="#1a1000" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="618" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#FAC775">Logstash</text>
  <text x="618" y="397" text-anchor="middle" font-size="9" fill="#aaa">Syslog · NetFlow · BGP</text>
  <text x="618" y="410" text-anchor="middle" font-size="8" fill="#666">grok · translate · geoip</text>

  <!-- OpenSearch Domain -->
  <rect x="703" y="358" width="165" height="60" rx="8" fill="#0a1929" stroke="#185FA5" stroke-width="2"/>
  <text x="785" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#85B7EB">Amazon OpenSearch</text>
  <text x="785" y="394" text-anchor="middle" font-size="9" fill="#aaa">VPC endpoint (private)</text>
  <text x="785" y="408" text-anchor="middle" font-size="8" fill="#666">m6g.large.search · 3-AZ</text>

  <!-- Dashboards -->
  <rect x="188" y="440" width="680" height="60" rx="8" fill="#0a1f0a" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="528" y="463" text-anchor="middle" font-size="12" font-weight="700" fill="#97C459">OpenSearch Dashboards</text>
  <text x="528" y="480" text-anchor="middle" font-size="10" fill="#aaa">Tunnel state · BGP events · VLAN traffic · Link failover · Latency per segment</text>
  <text x="528" y="495" text-anchor="middle" font-size="9" fill="#639922">Acceso via VPN/bastion — NO expuesto a internet</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CONNECTIONS / ARROWS                                -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Branch 1 → CSR (SD-WAN overlay over Internet) -->
  <path d="M138 80 Q155 80 178 148" fill="none" stroke="#EF9F27" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="0"/>
  <!-- Branch 2 → CSR (SD-WAN overlay) -->
  <path d="M138 200 Q158 200 178 165" fill="none" stroke="#EF9F27" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Corp DC → VGW (Direct Connect) -->
  <path d="M138 320 Q390 320 298 245" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- CSR → TGW (GRE Tunnel 1 — primary) -->
  <path d="M388 135 L440 135" fill="none" stroke="#5DCAA5" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="413" y="129" text-anchor="middle" font-size="8" fill="#5DCAA5">GRE+BGP</text>

  <!-- CSR → TGW (GRE Tunnel 2 — HA secondary, slightly offset) -->
  <path d="M388 155 L440 155" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="5 2" marker-end="url(#arrow-green)"/>
  <text x="413" y="168" text-anchor="middle" font-size="8" fill="#5DCAA5">GRE HA</text>

  <!-- TGW → Prod VPC -->
  <path d="M600 110 L640 87" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- TGW → Dev VPC -->
  <path d="M600 140 L640 177" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- TGW → Voice VPC -->
  <path d="M600 160 Q620 160 640 262" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- VPC Flow Logs from VPCs down to monitoring VPC -->
  <path d="M705 120 Q705 320 348 358" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>

  <!-- Pipeline: Flow Logs → Kinesis -->
  <path d="M348 388 L368 388" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Kinesis → Logstash -->
  <path d="M523 388 L543 388" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Logstash → OpenSearch -->
  <path d="M693 388 L703 388" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- OpenSearch → Dashboards -->
  <path d="M785 418 L785 440" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Kinesis → Dashboards (direct) -->
  <path d="M445 418 L445 440" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-blue)"/>

  <!-- Syslog from Cisco on-prem → Logstash -->
  <path d="M80 365 Q80 520 543 480" fill="none" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-orange)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND                                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="178" y="513" width="705" height="48" rx="6" fill="#0d1117" stroke="#333" stroke-width="0.5"/>
  <text x="190" y="528" font-size="9" font-weight="600" fill="#aaa">LEYENDA:</text>

  <line x1="240" y1="525" x2="265" y2="525" stroke="#EF9F27" stroke-width="2"/>
  <text x="268" y="529" font-size="9" fill="#888">SD-WAN overlay (internet)</text>

  <line x1="390" y1="525" x2="415" y2="525" stroke="#5DCAA5" stroke-width="2"/>
  <text x="418" y="529" font-size="9" fill="#888">GRE tunnel (primary)</text>

  <line x1="520" y1="525" x2="545" y2="525" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="5 2"/>
  <text x="548" y="529" font-size="9" fill="#888">GRE tunnel HA</text>

  <line x1="640" y1="525" x2="665" y2="525" stroke="#378ADD" stroke-width="1.5"/>
  <text x="668" y="529" font-size="9" fill="#888">VPC attachment</text>

  <line x1="240" y1="547" x2="265" y2="547" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="268" y="551" font-size="9" fill="#888">Direct Connect</text>

  <line x1="390" y1="547" x2="415" y2="547" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="418" y="551" font-size="9" fill="#888">VPC Flow Logs</text>

  <line x1="520" y1="547" x2="545" y2="547" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="548" y="551" font-size="9" fill="#888">Syslog on-prem</text>

  <!-- Title -->
  <text x="524" y="574" text-anchor="middle" font-size="10" fill="#555">SD-WAN + AWS Transit Gateway + OpenSearch Observability | Portfolio Project v1.0</text>
</svg>
